services:
  - type: web
    name: reviewlens-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: RAPIDAPI_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
    healthCheckPath: /api/health
